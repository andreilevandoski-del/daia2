<?xml version="1.0" encoding="UTF-8"?>
<svg width="390" height="900" viewBox="0 0 390 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="f-card" x="-6%" y="-6%" width="112%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.05"/>
    </filter>
    <filter id="f-btn-primary" x="-15%" y="-80%" width="130%" height="280%">
      <feDropShadow dx="0" dy="20" stdDeviation="12" flood-color="#3016db" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#3016db" flood-opacity="0.25"/>
    </filter>
    <filter id="f-topbar" x="0" y="0" width="100%" height="300%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect id="Page-Background" width="390" height="900" fill="#f2f5f3"/>

  <!-- ── Topbar ── -->
  <g id="Topbar">
    <rect width="390" height="64" fill="#f8fafc" filter="url(#f-topbar)"/>

    <!-- Back button -->
    <g id="Back-Button">
      <rect x="8" y="10" width="44" height="44" rx="22" fill="transparent"/>
      <path d="M28 22 L20 32 L28 42" stroke="#44474f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Activity icon -->
    <g id="Logo-Mark" transform="translate(60, 23)">
      <path d="M0 9 L4 9 L7 2 L11 16 L14 9 L18 9" stroke="#3016db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Logo wordmark -->
    <text id="Logo-Text" x="84" y="39" font-family="Roboto, sans-serif" font-size="22" font-weight="900" fill="#0e0067">daia</text>

    <!-- Signal bars -->
    <g id="Signal" transform="translate(354, 24)">
      <rect x="0" y="11" width="4" height="5"  rx="1" fill="#44474f"/>
      <rect x="6" y="7"  width="4" height="9"  rx="1" fill="#44474f"/>
      <rect x="12" y="3" width="4" height="13" rx="1" fill="#44474f"/>
      <rect x="18" y="0" width="4" height="16" rx="1" fill="#44474f"/>
    </g>
  </g>

  <!-- ── Stepper ── -->
  <g id="Stepper">
    <circle cx="186" cy="100" r="4"   fill="rgba(48,22,219,0.2)"/>
    <circle cx="202" cy="100" r="5"   fill="#3016db"/>
  </g>

  <!-- ── Passo 2 — Confirmar refeição ── -->
  <g id="Step-2-Confirmar">

    <!-- Title -->
    <text id="Title" x="24" y="150" font-family="Roboto, sans-serif" font-size="22" font-weight="900" fill="#0e0067">Confirmar refeição</text>

    <!-- Subtitle (2 lines) -->
    <text id="Subtitle" font-family="Roboto, sans-serif" font-size="14" font-weight="500" fill="#44474f">
      <tspan x="24" dy="0" y="172">Revise os itens detectados e informe sua</tspan>
      <tspan x="24" dy="21">glicose atual.</tspan>
    </text>

    <!-- ── Card ── -->
    <g id="Card-Refeicao">
      <rect x="24" y="218" width="342" height="254" rx="40" fill="white" filter="url(#f-card)"/>
      <rect x="24" y="218" width="342" height="254" rx="40" fill="none" stroke="rgba(225,226,236,0.35)" stroke-width="1"/>

      <!-- Confidence pill -->
      <g id="Confidence-Pill">
        <rect x="48" y="242" width="148" height="28" rx="14" fill="rgba(48,22,219,0.1)"/>
        <!-- Brain icon -->
        <circle cx="64" cy="256" r="6"   fill="none" stroke="#3016db" stroke-width="1.5"/>
        <circle cx="62" cy="253" r="1.5" fill="#3016db"/>
        <circle cx="66" cy="253" r="1.5" fill="#3016db"/>
        <path d="M62 259 Q64 261 66 259" stroke="#3016db" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <text x="76" y="261" font-family="Roboto, sans-serif" font-size="12" font-weight="700" fill="#3016db">Confiança 87%</text>
      </g>

      <!-- List item 1 -->
      <line x1="48"  y1="282" x2="342" y2="282" stroke="rgba(225,226,236,0.6)" stroke-width="1"/>
      <text x="48"  y="308" font-family="Roboto, sans-serif" font-size="15" font-weight="700" fill="#1a1c1e">Arroz branco</text>
      <text x="342" y="308" font-family="Roboto, sans-serif" font-size="13" fill="#44474f" text-anchor="end">48 g carb</text>

      <!-- List item 2 -->
      <line x1="48"  y1="324" x2="342" y2="324" stroke="rgba(225,226,236,0.6)" stroke-width="1"/>
      <text x="48"  y="350" font-family="Roboto, sans-serif" font-size="15" font-weight="700" fill="#1a1c1e">Feijão</text>
      <text x="342" y="350" font-family="Roboto, sans-serif" font-size="13" fill="#44474f" text-anchor="end">22 g carb</text>

      <!-- List item 3 -->
      <line x1="48"  y1="366" x2="342" y2="366" stroke="rgba(225,226,236,0.6)" stroke-width="1"/>
      <text x="48"  y="392" font-family="Roboto, sans-serif" font-size="15" font-weight="700" fill="#1a1c1e">Frango grelhado</text>
      <text x="342" y="392" font-family="Roboto, sans-serif" font-size="13" fill="#44474f" text-anchor="end">0 g carb</text>

      <!-- Total -->
      <text x="342" y="444" font-family="Roboto, sans-serif" font-size="13" font-weight="700" fill="#1a1c1e" text-anchor="end">Total: 70 g carb</text>
    </g>

    <!-- ── Reenviar foto (outline button) ── -->
    <g id="Btn-Reenviar-Foto">
      <rect x="24" y="494" width="342" height="56" rx="28" fill="none" stroke="#3016db" stroke-width="2"/>
      <!-- Camera icon -->
      <g transform="translate(133, 510)">
        <rect x="0" y="3"  width="20" height="14" rx="3"  fill="none" stroke="#3016db" stroke-width="1.6"/>
        <circle cx="10" cy="10" r="4"               fill="none" stroke="#3016db" stroke-width="1.6"/>
        <path d="M6 3 L8 0 L12 0 L14 3" stroke="#3016db" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
      </g>
      <text x="163" y="527" font-family="Roboto, sans-serif" font-size="16" font-weight="700" fill="#3016db">Reenviar foto</text>
    </g>

    <!-- ── Glucose field ── -->
    <g id="Field-Glicose">
      <!-- Label -->
      <text x="24" y="576" font-family="Roboto, sans-serif" font-size="12" font-weight="700" fill="#44474f" letter-spacing="0.5">GLICOSE ATUAL (MG/DL)</text>

      <!-- Input -->
      <rect x="24" y="584" width="342" height="56" rx="24" fill="white" stroke="rgba(225,226,236,0.5)" stroke-width="1"/>
      <text x="42"  y="617" font-family="Roboto, sans-serif" font-size="16" font-weight="500" fill="rgba(68,71,79,0.45)">Ex.: 120</text>

      <!-- Hint -->
      <text x="24" y="654" font-family="Roboto, sans-serif" font-size="12" fill="#44474f">Entre 20 e 600 mg/dL.</text>
    </g>

    <!-- ── Checkbox row ── -->
    <g id="Checkbox-Pular">
      <rect x="24" y="674" width="18" height="18" rx="3" fill="none" stroke="#44474f" stroke-width="1.5"/>
      <text x="50" y="687" font-family="Roboto, sans-serif" font-size="14" fill="#44474f">Pular glicose (sem bolus de correção)</text>
    </g>

    <!-- ── Calcular dose (primary button) ── -->
    <g id="Btn-Calcular-Dose">
      <rect x="24" y="716" width="342" height="56" rx="28" fill="#3016db" filter="url(#f-btn-primary)"/>
      <!-- Calculator icon -->
      <g transform="translate(143, 730)">
        <rect x="0" y="0" width="18" height="22" rx="3"  fill="none" stroke="white" stroke-width="1.6"/>
        <line x1="3" y1="7"  x2="15" y2="7"  stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="3" y1="12" x2="15" y2="12" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="3" y1="17" x2="15" y2="17" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="9" y1="2"  x2="9"  y2="6"  stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      </g>
      <text x="173" y="749" font-family="Roboto, sans-serif" font-size="16" font-weight="700" fill="white">Calcular dose</text>
    </g>
  </g>

  <!-- ── Bottom Navigation ── -->
  <g id="Bottom-Nav">
    <rect x="0" y="820" width="390" height="80" rx="0" fill="rgba(255,255,255,0.96)"/>
    <rect x="0" y="820" width="390" height="1"  fill="rgba(225,226,236,0.25)"/>

    <!-- Início -->
    <g id="Nav-Inicio" transform="translate(15, 828)">
      <g transform="translate(20, 0)">
        <path d="M10 2 L2 9 L2 20 L7 20 L7 14 L13 14 L13 20 L18 20 L18 9 Z"
              stroke="rgba(68,71,79,0.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="20" y="36" font-family="Roboto, sans-serif" font-size="10" font-weight="700"
            fill="rgba(68,71,79,0.6)" text-anchor="middle" letter-spacing="0.3">Início</text>
    </g>

    <!-- Scan (active) -->
    <g id="Nav-Scan-Active" transform="translate(105, 828)">
      <g transform="translate(17, 1)">
        <rect x="0" y="4"  width="22" height="16" rx="3" stroke="#3016db" stroke-width="1.8" fill="none"/>
        <circle cx="11" cy="12" r="4"              stroke="#3016db" stroke-width="1.8" fill="none"/>
        <path d="M7 4 L9 0 L13 0 L15 4" stroke="#3016db" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
      </g>
      <text x="17" y="36" font-family="Roboto, sans-serif" font-size="10" font-weight="700"
            fill="#3016db" text-anchor="middle" letter-spacing="0.3">Scan</text>
    </g>

    <!-- Áudio -->
    <g id="Nav-Audio" transform="translate(213, 828)">
      <g transform="translate(10, 1)">
        <rect x="4" y="0"  width="10" height="14" rx="5" stroke="rgba(68,71,79,0.6)" stroke-width="1.8" fill="none"/>
        <path d="M0 11 Q0 19 9 19 Q18 19 18 11"   stroke="rgba(68,71,79,0.6)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        <line x1="9" y1="19" x2="9" y2="23"       stroke="rgba(68,71,79,0.6)" stroke-width="1.8" stroke-linecap="round"/>
      </g>
      <text x="10" y="36" font-family="Roboto, sans-serif" font-size="10" font-weight="700"
            fill="rgba(68,71,79,0.6)" text-anchor="middle" letter-spacing="0.3">Áudio</text>
    </g>

    <!-- Perfil -->
    <g id="Nav-Perfil" transform="translate(318, 828)">
      <g transform="translate(7, 1)">
        <circle cx="9" cy="6" r="5"                stroke="rgba(68,71,79,0.6)" stroke-width="1.8" fill="none"/>
        <path d="M0 22 Q0 14 9 14 Q18 14 18 22"   stroke="rgba(68,71,79,0.6)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      </g>
      <text x="7" y="36" font-family="Roboto, sans-serif" font-size="10" font-weight="700"
            fill="rgba(68,71,79,0.6)" text-anchor="middle" letter-spacing="0.3">Perfil</text>
    </g>
  </g>
</svg>
