<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daia — Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="vendor/tabler-icons/tabler-icons.min.css">
  <link rel="stylesheet" href="css/daia.css">
</head>
<body data-nav="profile">
  <div class="app">
    <header class="topbar">
      <div class="topbar-start">
        <a href="index.html" class="topbar-back" aria-label="Voltar ao início">
          <i class="ti ti-chevron-left icon-tabler-md" aria-hidden="true"></i>
        </a>
        <div class="logo-row">
          <div class="logo-img-wrap">
            <img src="https://www.figma.com/api/mcp/asset/8a941c59-8f31-4a0a-8b6e-9ddc30814627" alt="Daia">
          </div>
        </div>
      </div>
    </header>

    <main class="screen-main">
      <h1 class="screen-title">Perfil</h1>
      <p class="screen-sub">Configure razão insulina:carboidrato, fator de correção e meta de glicemia.</p>
      <div class="field">
        <label class="field-label" for="profile-icr">Razão I:C (g carb / 1 U)</label>
        <input type="number" class="input-field" id="profile-icr" value="12" min="1">
      </div>
      <div class="field">
        <label class="field-label" for="profile-cf">Fator de correção (mg/dL por 1 U)</label>
        <input type="number" class="input-field" id="profile-cf" value="50" min="1">
      </div>
      <div class="field">
        <label class="field-label" for="profile-target">Meta de glicose (mg/dL)</label>
        <input type="number" class="input-field" id="profile-target" value="100" min="70" max="150">
      </div>
      <div class="callout callout--warning">
        <i class="ti ti-stethoscope icon-tabler-md" aria-hidden="true"></i>
        <span>Defina estes valores com seu médico antes de usar o app.</span>
      </div>
      <button type="button" class="btn" id="btn-profile-save">Salvar perfil</button>
    </main>

    <nav class="bottom-nav" aria-label="Navegação principal">
      <a href="index.html" class="nav-link" data-nav="home">
        <i class="ti ti-home icon-tabler-nav" aria-hidden="true"></i>
        <span class="nav-label">Início</span>
      </a>
      <a href="scan.html" class="nav-link" data-nav="scan">
        <i class="ti ti-camera icon-tabler-nav" aria-hidden="true"></i>
        <span class="nav-label">Scan</span>
      </a>
      <a href="audio.html" class="nav-link" data-nav="audio">
        <i class="ti ti-microphone icon-tabler-nav" aria-hidden="true"></i>
        <span class="nav-label">Áudio</span>
      </a>
      <a href="profile.html" class="nav-link" data-nav="profile">
        <i class="ti ti-user icon-tabler-nav" aria-hidden="true"></i>
        <span class="nav-label">Perfil</span>
      </a>
    </nav>
  </div>
  <script src="js/nav.js" defer></script>
  <script src="js/profile-page.js" defer></script>
</body>
</html>
