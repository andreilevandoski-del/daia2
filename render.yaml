# Render.com — Web Service (Node)
# Raiz do serviço = pasta onde está este ficheiro e o package.json (Root Directory no painel).
# Start Command no painel deve ser: node server/index.js (ou deixa o Blueprint aplicar este YAML).

services:
  - type: web
    name: daia
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
